<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login | MediNexus</title>
  <link rel="stylesheet" href="css/style.css"/>
  <style>
    .login-wrap {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 1.25rem;
      background:
        radial-gradient(circle at 20% 20%, rgba(14,165,233,0.14), transparent 40%),
        radial-gradient(circle at 80% 80%, rgba(6,182,212,0.1), transparent 40%),
        var(--bg);
    }
    .login-card {
      width: min(460px, 100%);
      border: 1px solid var(--border);
      border-radius: 14px;
      background: rgba(10, 16, 30, 0.9);
      padding: 1.25rem;
      box-shadow: 0 30px 80px rgba(2, 6, 23, 0.55);
    }
    .login-title { font-size: 1.3rem; font-weight: 800; margin: 0 0 0.35rem; }
    .login-sub { color: var(--muted); font-size: 0.84rem; margin-bottom: 1rem; }
    .field { margin-bottom: 0.75rem; }
    .field label { display:block; font-size:0.72rem; color:var(--muted); margin-bottom:0.35rem; }
    .field input {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: rgba(255,255,255,0.04);
      color: var(--text);
      padding: 0.62rem 0.72rem;
      font-family: 'Space Grotesk', sans-serif;
    }
    .field input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 2px rgba(14,165,233,0.2); }
    .login-btn {
      width: 100%;
      border: 1px solid rgba(14,165,233,0.45);
      background: rgba(14,165,233,0.12);
      color: var(--primary);
      border-radius: 8px;
      padding: 0.65rem 0.8rem;
      font-weight: 700;
      cursor: pointer;
      font-family: 'Space Grotesk', sans-serif;
    }
    .login-btn:disabled { opacity: 0.7; cursor: wait; }
    .login-error { margin-top:0.65rem; color:#fca5a5; font-size:0.76rem; min-height:1.1rem; }
    .demo-roles {
      margin-top: 0.9rem;
      border: 1px dashed rgba(148,163,184,0.35);
      border-radius: 8px;
      padding: 0.7rem;
      background: rgba(255,255,255,0.02);
    }
    .demo-roles h4 { margin: 0 0 0.45rem; font-size: 0.78rem; color: var(--muted); letter-spacing: 0.4px; }
    .demo-roles ul { margin: 0; padding-left: 1rem; color: var(--text); font-size: 0.76rem; line-height: 1.45; }
  </style>
</head>
<body>
  <div class="login-wrap">
    <form class="login-card" id="login-form">
      <h1 class="login-title">MediNexus Access</h1>
      <div class="login-sub">Sign in to open your role dashboard.</div>

      <div class="field">
        <label for="username">Username</label>
        <input id="username" autocomplete="username" placeholder="admin / doctor / nurse / ops" required/>
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input id="password" type="password" autocomplete="current-password" placeholder="Enter password" required/>
      </div>

      <button class="login-btn" id="login-btn" type="submit">Login</button>
      <div class="login-error" id="login-error"></div>

      <div class="demo-roles">
        <h4>Demo Credentials</h4>
        <ul>
          <li>Admin: admin / Admin@123</li>
          <li>Doctor: doctor / Doctor@123</li>
          <li>Nurse: nurse / Nurse@123</li>
          <li>Operations: ops / Ops@123</li>
        </ul>
      </div>
    </form>
  </div>

  <script src="js/auth.js"></script>
  <script>
    const form = document.getElementById('login-form');
    const errEl = document.getElementById('login-error');
    const btn = document.getElementById('login-btn');

    const params = new URLSearchParams(window.location.search);
    const nextPage = (params.get('next') || '').trim();

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      errEl.textContent = '';
      btn.disabled = true;

      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      try {
        const session = await window.mnxAuth.login(username, password);
        const redirect = nextPage || window.mnxAuth.roleHome(session.role);
        window.location.href = redirect;
      } catch (err) {
        errEl.textContent = err.message || 'Unable to login.';
      } finally {
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
